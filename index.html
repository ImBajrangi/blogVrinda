<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Vrindopnishad — Home Archive</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,typography,aspect-ratio"></script>
    
    <!-- Premium Typography & Icons -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700&family=Newsreader:ital,opsz,wght@0,6..72,200..800;1,6..72,200..800&family=Mukta:wght@200;300;400;500;600;700;800&family=Noto+Sans+Devanagari:wght@100..900&family=Laila:wght@300;400;500;600;700&family=Poppins:wght@100;200;300;400;500;600;700;800;900&family=Teko:wght@300;400;500;600;700&family=Kalam:wght@300;400;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />

    <script>
        // Custom Tailwind Configuration
        window.tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#1717cf",
                        "divine-gold": "#d4af37",
                        "cinema-dark": "#0A0A0A",
                    },
                    fontFamily: {
                        "display": ["Newsreader", "serif"],
                        "sans": ["Poppins", "Inter", "sans-serif"],
                        "hindi": ["Mukta", "sans-serif"]
                    }
                },
            },
        }
    </script>
    <style>
        body {
            font-family: 'DM Sans', sans-serif;
            background-color: #FAFAFA;
            color: #1A1A1A;
            margin: 0;
            padding: 0;
        }
        h1, h2, h3, h4, .font-display {
            font-family: 'Newsreader', serif;
        }
        
        .grayscale-img {
            filter: grayscale(100%);
            transition: filter 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }
        
        .group:hover .grayscale-img {
            filter: grayscale(0%);
        }

        .title-hover-italic {
            transition: font-style 0.3s ease;
        }

        .group:hover .title-hover-italic {
            font-style: italic;
        }
        
        .masonry-grid {
            column-count: 1;
            column-gap: 2rem;
        }
        
        @media (min-width: 768px) {
            .masonry-grid {
                column-count: 2;
                column-gap: 4rem;
            }
        }

        .masonry-item {
            break-inside: avoid;
            margin-bottom: 4rem;
        }

        /* Material Symbols Integration */
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>
<body class="antialiased selection:bg-primary selection:text-white">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
</body>
</html>
